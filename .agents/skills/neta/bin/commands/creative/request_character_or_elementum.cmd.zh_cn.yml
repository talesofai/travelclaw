name: request_character_or_elementum
title: 请求角色或元素
description: 通过名称(精确匹配)或UUID获取角色或元素的详细信息
parameters:
  name: |
    角色或元素的名称(精确匹配)
      - 当提供name时,工具会先搜索匹配的角色或元素(使用精确匹配),然后获取详情
      - 示例："奈塔#996"、"初音未来"、"赛博朋克风格"
      - 注意：使用精确匹配,确保名称完全一致
      - 如果同时提供name和uuid,优先使用uuid
  uuid: |
    角色或元素的UUID
      - 当提供uuid时,直接获取角色或元素详情
      - 可以通过search_tcp工具获取UUID
      - 如果同时提供name和uuid,优先使用uuid
  parent_type: 指定搜索类型
